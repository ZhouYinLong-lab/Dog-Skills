    <style>
      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #fcfbf8;
      }

      .boot-loading {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #ffffff 0%, #fcfbf8 58%, #f5efe8 100%);
        color: #4b2b61;
        font-family: Georgia, "Times New Roman", "Songti SC", "SimSun", serif;
      }

      .boot-loading__inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        transform: translateY(-4vh);
      }

      .boot-loading__spinner {
        width: 42px;
        height: 42px;
        border: 1px solid rgba(75, 43, 97, 0.16);
        border-top-color: #4b2b61;
        border-radius: 999px;
        animation: boot-spin 0.9s linear infinite;
      }

      .boot-loading__brand {
        font-size: 13px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }

      .boot-loading__text {
        color: #8b7355;
        font-size: 12px;
        letter-spacing: 0.18em;
      }

      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-loading__spinner {
          animation: none;
        }
      }
    </style>
